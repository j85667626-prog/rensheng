<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background Music Toggle</title>
    <script defer src="./assets/script.js"></script>
    <link rel="stylesheet" href="./assets/style.css">
    <style>
      #audio-toggle {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 9999;
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: #1a1a1a;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.2s ease;
        padding: 0;
      }

      #audio-toggle:hover {
        transform: translateY(-1px);
      }

      #audio-toggle:active {
        transform: translateY(0);
      }

      #audio-toggle .audio-toggle__icon {
        display: inline-block;
        width: 20px;
        height: 20px;
        font-size: 20px;
        line-height: 20px;
        transform-origin: center;
      }

      #audio-toggle.is-playing .audio-toggle__icon {
        animation: audio-note-spin 1.2s linear infinite;
      }

      @keyframes audio-note-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      #creator-credit {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 6px;
        z-index: 9998;
        text-align: center;
        font-size: 12px;
        letter-spacing: 0.2em;
        color: rgba(26, 26, 26, 0.7);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }

      #creator-credit.is-visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="creator-credit"></div>
    <audio id="bg-audio" preload="none" loop>
      <source src="./assets/serene-view.mp3" type="audio/mpeg" />
    </audio>
    <button
      id="audio-toggle"
      type="button"
      aria-pressed="false"
      aria-label="Play background music"
    >
      <span class="audio-toggle__icon" aria-hidden="true">&#9835;</span>
    </button>
    <script>
      (function () {
        const audio = document.getElementById("bg-audio");
        const button = document.getElementById("audio-toggle");
        const root = document.getElementById("root");
        const credit = document.getElementById("creator-credit");

        if (!audio || !button || !root || !credit) return;

        const updateLabel = (playing) => {
          button.classList.toggle("is-playing", playing);
          button.setAttribute("aria-pressed", String(playing));
          button.setAttribute("aria-label", playing ? "Pause background music" : "Play background music");
        };

        const updateCredit = () => {
          const text = root.textContent || "";
          const visible =
            text.includes("\u5206\u4eab\u7ed9\u597d\u53cb") ||
            text.includes("\u91cd\u65b0\u4f53\u9a8c") ||
            text.includes("\u67e5\u770b\u7ed3\u8bed") ||
            text.includes("\u4fe1\u8bda\u804c\u573a\u7cfb\u5217") ||
            text.includes("\u8fbd\u5b81\u975e\u9057\u6587\u5316\u4f20\u64ad");
          credit.classList.toggle("is-visible", visible);
        };

        credit.textContent = "\u521b\u4f5c\u4eba\uff1a\u4f55\u946b\u5937";

        updateLabel(false);
        updateCredit();

        button.addEventListener("click", async () => {
          if (audio.paused) {
            try {
              await audio.play();
              updateLabel(true);
            } catch (error) {
              console.warn("Unable to start audio playback:", error);
            }
          } else {
            audio.pause();
            updateLabel(false);
          }
        });

        audio.addEventListener("ended", () => updateLabel(false));
        audio.addEventListener("pause", () => updateLabel(false));
        audio.addEventListener("play", () => updateLabel(true));

        const observer = new MutationObserver(updateCredit);
        observer.observe(root, { childList: true, subtree: true, characterData: true });

        setInterval(updateCredit, 500);
      })();
    </script>
  </body>
</html>
